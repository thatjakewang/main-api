[pytest]
# The app package lives at the repo root; without this, bare `pytest` fails to
# import it (`python -m pytest` only works by accident of cwd being on sys.path).
pythonpath = .
filterwarnings =
    # slowapi still calls asyncio.iscoroutinefunction internally; not ours to fix.
    ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning:slowapi
